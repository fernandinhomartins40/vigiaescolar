services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vigiaescolar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vigiaescolar"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vigiaescolar?schema=public
      CORS_ORIGINS: http://localhost:7003
      SESSION_COOKIE_NAME: vigiaescolar_session
      SESSION_TTL_DAYS: 14
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "7003:7003"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - edge

volumes:
  postgres_data:

networks:
  internal:
    internal: true
  edge: {}
