appId: br.com.vigiaescolar.gateway
productName: VigiaEscolar Gateway
copyright: Copyright © 2026 VigiaEscolar

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.ts"
  - "!tsconfig.json"

# Auto-update vai buscar updates em https://vigiaescolar.com.br/downloads/
publish:
  provider: generic
  url: https://vigiaescolar.com.br/downloads/gateway/

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: VigiaEscolar-Gateway-Setup-${version}.${ext}
  # Sem assinatura digital por enquanto — usuário verá aviso do SmartScreen
  # (até a gente comprar um cert OV ou usar Cloudflare/Sectigo).
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  shortcutName: VigiaEscolar Gateway

mac:
  target: dmg
  category: public.app-category.utilities

linux:
  target:
    - AppImage
    - deb
  category: Network
