appId: br.com.vigiaescolar.gateway
productName: VigiaEscolar Gateway
copyright: Copyright © 2026 VigiaEscolar

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - build/icon.png
  - package.json
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.ts"
  - "!tsconfig.json"
  - "!node_modules/@ffmpeg-installer/win32-x64/**/*"

extraResources:
  - from: vendor/go2rtc/go2rtc.exe
    to: tools/go2rtc.exe
  - from: vendor/ffmpeg/ffmpeg.exe
    to: tools/ffmpeg.exe

# Auto-update vai buscar updates em https://vigiaescolar.com.br/downloads/
publish:
  provider: generic
  url: https://vigiaescolar.com.br/downloads/gateway/

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  artifactName: VigiaEscolar-Gateway-Setup-${version}.${ext}
  # Sem certificado configurado, o Windows exibira aviso do SmartScreen.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VigiaEscolar Gateway
  runAfterFinish: true
  installerLanguages:
    - pt_BR

mac:
  target: dmg
  category: public.app-category.utilities

linux:
  target:
    - AppImage
    - deb
  category: Network
