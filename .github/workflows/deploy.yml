name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PASSWORD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 72.60.10.108 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy source to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='apps/api/dist/' \
            --exclude='apps/api/uploads/' \
            --exclude='ultrazend-face-server/node_modules/' \
            --exclude='apps/camera-gateway/node_modules/' \
            ./ root@72.60.10.108:/opt/vigiaescolar/

      - name: Run deploy script on VPS
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            root@72.60.10.108 \
            "mkdir -p /opt/vigiaescolar && bash /opt/vigiaescolar/scripts/deploy.sh 2>&1"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
