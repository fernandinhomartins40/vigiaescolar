name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VPS_HOST: 72.60.10.108
  VPS_USER: root
  SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=20

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass and rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Copy source to VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS $VPS_USER@$VPS_HOST "mkdir -p /opt/vigiaescolar"

          sshpass -e rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='apps/api/dist/' \
            --exclude='apps/api/uploads/' \
            --exclude='ultrazend-face-server/node_modules/' \
            --exclude='apps/camera-gateway/node_modules/' \
            ./ $VPS_USER@$VPS_HOST:/opt/vigiaescolar/

      - name: Run deploy script on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh $SSH_OPTS $VPS_USER@$VPS_HOST \
            "bash /opt/vigiaescolar/scripts/deploy.sh 2>&1"
