server {
  listen 7003;
  server_name _;

  client_max_body_size 20m;
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream api;
  set $web_upstream web;

  location = /downloads/gateway/latest.yml {
    alias /var/www/downloads/gateway/latest.yml;
    add_header Cache-Control "no-cache";
  }

  location /downloads/gateway/ {
    alias /var/www/downloads/gateway/;
    add_header Cache-Control "public, max-age=3600";
    add_header Accept-Ranges bytes;
  }

  location /api/ {
    proxy_pass http://$api_upstream:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    proxy_pass http://$web_upstream:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
